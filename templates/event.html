<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
</head>
<body>
  <div class="site-shell">
    <main class="site-main">
      <a class="top-link" href="../../">← All APHR events</a>
      {{ brand_strip }}

      <header class="site-header">
        <div class="eyebrow">{{ event_type }}</div>
        <h1 class="site-title">{{ event_title }}</h1>
        <p class="site-subtitle">{{ event_description }}</p>
      </header>

      <section class="grid" aria-label="Available products">
        {{ product_cards }}
      </section>

      <footer class="site-footer">
        Khalid M. Mosalam and Guanren Zhou · University of California, Berkeley
      </footer>
    </main>
  </div>
</body>
</html>
